spring.application.name=url-shortener

# MongoDB connection - reads MONGODB_URI env var in production, falls back to local for dev
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/urlshortenerdb}

# Render sets PORT automatically; fallback to 8080 for local dev
server.port=${PORT:8080}

# Base URL used to build the shortUrl in the response - set APP_BASE_URL env var in production
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Comma-separated list of allowed CORS origins - set ALLOWED_ORIGINS env var in production
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
